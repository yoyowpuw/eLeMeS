server:
  port: 8083

spring:
  application:
    name: course-management
  datasource:
    url: jdbc:postgresql://localhost:5432/elemes?currentSchema=course_mgmt
    # Ch.12 §2: NOT the elemes superuser — RLS is meaningless against a
    # superuser, which bypasses row security unconditionally. See
    # infra/postgres/init-app-role.sql.
    username: elemes_app
    password: elemes_app_local_dev
  flyway:
    enabled: true
    schemas: course_mgmt
    create-schemas: true
    default-schema: course_mgmt
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: course-management
      auto-offset-reset: earliest
      # Plain String, not JsonDeserializer — this is the only topic this
      # service consumes, so there's no default.type collision to avoid
      # (unlike Certification, which juggles two payload types); the
      # listener parses the JSON payload itself.
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/elemes

management:
  endpoints:
    web:
      exposure:
        include: health,info

org-hierarchy:
  base-url: http://localhost:8085

opa:
  base-url: http://localhost:8181
