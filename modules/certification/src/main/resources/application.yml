server:
  port: 8084

spring:
  application:
    name: certification
  datasource:
    url: jdbc:postgresql://localhost:5432/elemes?currentSchema=certification
    # Ch.12 §2: NOT the elemes superuser — RLS is meaningless against a
    # superuser, which bypasses row security unconditionally. See
    # infra/postgres/init-app-role.sql.
    username: elemes_app
    password: elemes_app_local_dev
  flyway:
    enabled: true
    schemas: certification
    create-schemas: true
    default-schema: certification
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: certification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.elemes.common.EnrollmentEventMessage
        spring.json.trusted.packages: com.elemes.common
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/elemes

management:
  endpoints:
    web:
      exposure:
        include: health,info

org-hierarchy:
  base-url: http://localhost:8085

opa:
  base-url: http://localhost:8181

# Ch.40 §3 ADR-066: AppRole credentials scoped to certificate-signing-policy
# (infra/vault/certificate-signing-policy.hcl) — NOT the Vault root token.
# role_id is safe to commit (it identifies the role, not a secret by
# itself); secret_id is the actual credential and would never be committed
# in a real deployment (Vault Agent / a secrets-injection sidecar would
# supply it) — it's here in plaintext purely because this whole stack is
# local, disposable dev infrastructure with a fixed root token anyway. See
# README's Vault bootstrap step for how both were generated.
vault:
  base-url: http://localhost:8200
  role-id: 6bd22380-6a6c-7de9-e71e-73667d8f3499
  secret-id: 71ecee48-5338-7a39-5ed8-b78b4bbd96c4
