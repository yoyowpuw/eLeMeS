server:
  port: 8084

spring:
  application:
    name: certification
  datasource:
    url: jdbc:postgresql://localhost:5432/elemes?currentSchema=certification
    # Ch.12 §2: NOT the elemes superuser — RLS is meaningless against a
    # superuser, which bypasses row security unconditionally. See
    # infra/postgres/init-app-role.sql.
    username: elemes_app
    password: elemes_app_local_dev
  flyway:
    enabled: true
    schemas: certification
    create-schemas: true
    default-schema: certification
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: certification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.elemes.common.EnrollmentEventMessage
        spring.json.trusted.packages: com.elemes.common
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/elemes

management:
  endpoints:
    web:
      exposure:
        include: health,info

org-hierarchy:
  base-url: http://localhost:8085

opa:
  base-url: http://localhost:8181

# Ch.40 §3 ADR-066: local Vault dev-mode root token — never a real
# deployment credential, same category as Keycloak's dev-mode admin
# password. See docker-compose.yml's vault service.
vault:
  base-url: http://localhost:8200
  token: elemes-root-token
