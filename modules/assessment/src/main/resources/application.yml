server:
  port: 8082

spring:
  application:
    name: assessment
  datasource:
    url: jdbc:postgresql://localhost:5432/elemes?currentSchema=assessment
    username: elemes
    password: elemes_local_dev
  flyway:
    enabled: true
    schemas: assessment
    create-schemas: true
    default-schema: assessment
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Plain String, not JsonSerializer: the outbox already stores
      # pre-serialized JSON (via AssessmentEventPublisher), so the poller
      # sends raw strings — JsonSerializer would double-encode them.
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info
