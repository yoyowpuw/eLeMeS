server:
  port: 8085

spring:
  application:
    name: org-hierarchy
  datasource:
    url: jdbc:postgresql://localhost:5432/elemes?currentSchema=org_hierarchy
    # Ch.12 §2: NOT the elemes superuser — RLS is meaningless against a
    # superuser, which bypasses row security unconditionally. See
    # infra/postgres/init-app-role.sql.
    username: elemes_app
    password: elemes_app_local_dev
  flyway:
    enabled: true
    schemas: org_hierarchy
    create-schemas: true
    default-schema: org_hierarchy
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Plain String, not JsonSerializer — see assessment's application.yml comment;
      # the outbox already stores pre-serialized JSON via OrgUnitEventPublisher.
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/elemes

management:
  endpoints:
    web:
      exposure:
        include: health,info

opa:
  base-url: http://localhost:8181
