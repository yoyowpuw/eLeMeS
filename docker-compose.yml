services:
  postgres:
    image: postgres:16-alpine
    container_name: elemes-postgres
    environment:
      POSTGRES_DB: elemes
      POSTGRES_USER: elemes
      POSTGRES_PASSWORD: elemes_local_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Ch.12 §2: creates the non-superuser elemes_app role every service
      # actually connects as — RLS is meaningless against the superuser
      # POSTGRES_USER role above. Only runs on a genuinely fresh volume
      # (Postgres skips /docker-entrypoint-initdb.d/ if data already
      # exists) — see README for the manual step on an existing one.
      - ./infra/postgres/init-app-role.sql:/docker-entrypoint-initdb.d/01-init-app-role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elemes -d elemes"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Kafka-API-compatible, single-binary, no ZooKeeper — local stand-in for the
  # managed Kafka selected in Ch.15 ADR-024. Fully wired: assessment and
  # enrollment both publish via a transactional outbox; enrollment and
  # certification both consume.
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: elemes-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  # S3-compatible local stand-in for the cloud object storage selected in
  # Ch.28 ADR-045. Not yet consumed by any service.
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: elemes-minio
    environment:
      MINIO_ROOT_USER: elemes
      MINIO_ROOT_PASSWORD: elemes_local_dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local stand-in for the bought CIAM platform selected in Ch.16 ADR-026
  # (Auth0/Okta CIC/Cognito-class) — Keycloak is a real, self-hostable OIDC
  # provider commonly used by teams to simulate their actual CIAM locally,
  # not a custom-built auth system. Realm/client/users auto-imported from
  # infra/keycloak/realm-export.json at startup.
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: elemes-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  # Ch.17 ADR-028: OPA-class policy-as-code engine. Production topology is a
  # sidecar per service; locally, one shared instance is queried over HTTP by
  # all six services — see infra/opa/policies/authz.rego for the actual
  # policy (tenant isolation + role checks).
  opa:
    image: openpolicyagent/opa:0.68.0
    container_name: elemes-opa
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ./infra/opa/policies:/policies:ro

  # Ch.40 §3 ADR-066: cloud-native, HSM-backed KMS for the certificate-
  # signing key in production. Vault's Transit secrets engine is the local,
  # self-hostable stand-in — same category as Redpanda-for-Kafka and
  # Keycloak-for-CIAM, a real system that does the actual job (server-side
  # signing/verification, the private key is never exported in plaintext,
  # native key-version rotation) rather than a custom-built substitute. Dev
  # mode with a fixed root token is a local-only simplification — never a
  # real deployment pattern, called out in README same as Keycloak's
  # dev-mode equivalent.
  vault:
    image: hashicorp/vault:1.17
    container_name: elemes-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: elemes-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8200/v1/sys/health?standbyok=true"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
